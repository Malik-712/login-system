<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تسجيل الدخول</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Hamburger (right side, RTL) + slide-in drawer -->
    <button
      id="menuButton"
      class="menu-button"
      type="button"
      aria-label="القائمة"
      aria-controls="menuPanel"
      aria-expanded="false"
      hidden
    >
      <span class="menu-bars" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>

    <div id="menuOverlay" class="menu-overlay"></div>

    <nav id="menuPanel" class="menu-panel" aria-label="القائمة">
      <ul id="menuList" class="menu-list"></ul>
      <div class="menu-footer">
        <div class="menu-divider"></div>
        <button id="logoutButton" class="menu-logout" type="button">
          تسجيل الخروج
        </button>
      </div>
    </nav>

    <!-- ===== AUTH (login / activation flow) ===== -->
    <div id="authView" class="form-box">
      <h1>تسجيل الدخول</h1>
      <div id="roleLabel" class="role-label" hidden></div>

      <div id="step1" class="step active">
        <form id="idForm">
          <label for="idInput">المعرف</label>
          <input
            type="text"
            id="idInput"
            inputmode="numeric"
            maxlength="6"
            placeholder="أدخل المعرف المكوّن من 6 أرقام"
            required
          />
          <button type="submit">متابعة</button>
        </form>
        <div class="helper-text">ما تعرف معرفك؟ تواصل مع الإدارة</div>
      </div>

      <div id="step2" class="step">
        <form id="activateForm">
          <label for="firstNameInput">الاسم الأول</label>
          <input type="text" id="firstNameInput" required />

          <label for="lastNameInput">الاسم الأخير</label>
          <input type="text" id="lastNameInput" required />

          <label for="newPasswordInput">كلمة المرور (4 أرقام)</label>
          <input
            type="password"
            id="newPasswordInput"
            inputmode="numeric"
            maxlength="4"
            required
          />

          <button type="submit">تفعيل الحساب</button>
          <button type="button" class="link-btn" onclick="goToStep1()">
            رجوع
          </button>
        </form>
      </div>

      <div id="step3" class="step">
        <form id="loginForm">
          <label for="passwordInput">كلمة المرور</label>
          <input
            type="password"
            id="passwordInput"
            inputmode="numeric"
            maxlength="4"
            required
          />

          <button type="submit">دخول</button>
          <button type="button" class="link-btn" onclick="goToStep1()">
            رجوع
          </button>
        </form>
      </div>

      <div id="msg"></div>
    </div>

    <!-- ===== APP (after login) — role-specific navigation & screens ===== -->
    <div id="appView" class="app" hidden>
      <header class="app-header">
        <p id="appGreeting" class="app-greeting"></p>
        <p id="appRole" class="app-role"></p>
      </header>
      <h2 id="appViewTitle" class="app-view-title"></h2>
      <div id="appContent" class="app-content"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
